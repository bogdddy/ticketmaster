# nginx/nginx.conf
events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS resolver so NGINX re-resolves worker-direct
    # on each request — required for docker-compose --scale to work correctly.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        location / {
            # Variable forces DNS re-resolution via the resolver above,
            # enabling round-robin across all worker-direct replicas.
            set $backend http://worker-direct:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}